services:

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  products:
    build: ./services/products
    ports:
      - "3001:3001"
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: productsdb
    depends_on:
      postgres:
        condition: service_healthy

  orders:
    build: ./services/orders
    ports:
      - "3002:3002"
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: ordersdb
      PRODUCTS_SERVICE_URL: http://products:3001
      RABBITMQ_URL: amqp://rabbitmq
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  inventory:
    build: ./services/inventory
    ports:
      - "3003:3003"
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: productsdb
      RABBITMQ_URL: amqp://rabbitmq
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "3000:3000"
    environment:
      PRODUCTS_SERVICE_URL: http://products:3001
      ORDERS_SERVICE_URL: http://orders:3002
    depends_on:
      - products
      - orders

volumes:
  postgres_data: